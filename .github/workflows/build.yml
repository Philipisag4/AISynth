name: Build AI Synth

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-7.0.12-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A x64
        shell: cmd

      - name: Build VST3
        run: cmake --build build --config Release --target AISynth_VST3 --parallel
        shell: cmd

      - name: Build Standalone
        run: cmake --build build --config Release --target AISynth_Standalone --parallel
        shell: cmd

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
        shell: cmd

      - name: Build Installer
        run: |
          cd Installer
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
        shell: cmd

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: AI-Synth-Installer
          path: Installer/Output/AI Synth Setup.exe
          if-no-files-found: warn

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: AI-Synth-VST3
          path: build/AISynth_artefacts/Release/VST3/AI Synth.vst3
          if-no-files-found: warn
